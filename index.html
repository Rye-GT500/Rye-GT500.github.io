<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 核心矩陣解碼測試端</title>
    <style>
        body {
            background-color: #111111;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 24px;
            text-shadow: 0 0 10px #00FF00;
        }

        .subtitle {
            color: #888888;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 難度選擇選單 */
        .mode-selector {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            background-color: #222222;
            color: #00FF00;
            border: 1px solid #00FF00;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: #00FF00;
            color: #111111;
            box-shadow: 0 0 10px #00FF00;
        }

        /* 歷史紀錄區 */
        #history-scroll {
            width: 100%;
            max-width: 400px;
            height: 180px;
            border: 1px solid #333333;
            background-color: #050505;
            margin-bottom: 20px;
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .history-tile {
            width: 32px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        /* 當前輸入槽 */
        #slot-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .input-slot {
            width: 50px;
            height: 65px;
            background-color: #222222;
            border: 2px solid #333333;
            color: white;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        .input-slot.focused {
            background-color: #444444;
            border-color: #00FF00;
            box-shadow: 0 0 5px #00FF00;
        }

        /* 虛擬鍵盤 */
        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        .keyboard-row {
            display: flex;
            gap: 6px;
            width: 100%;
            justify-content: center;
        }

        .key-btn {
            flex: 1;
            max-width: 70px;
            height: 55px;
            background-color: #333333;
            color: white;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .key-btn:active {
            background-color: #555555;
        }

        .key-btn.action-back {
            background-color: #B71C1C;
            max-width: 110px;
        }

        .key-btn.action-submit {
            background-color: #1B5E20;
            max-width: 110px;
        }

        /* 狀態顏色定義 */
        .color-green { background-color: #2ECC71; border-color: #2ECC71; }
        .color-yellow { background-color: #F1C40F; border-color: #F1C40F; }
        .color-red { background-color: #E74C3C; border-color: #E74C3C; }

        /* 彈窗提示 */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background-color: #222222;
            border: 2px solid #00FF00;
            padding: 30px;
            text-align: center;
            max-width: 320px;
            width: 80%;
            box-shadow: 0 0 20px #00FF00;
        }

        .modal h2 { margin-top: 0; color: #2ECC71; }
        .modal p { color: white; font-size: 16px; line-height: 1.6; }
    </style>
</head>
<body>

    <h1>🔐 核心矩陣解碼中</h1>
    <div class="subtitle">平民任務測試端 - 請破譯核心安全密碼</div>

    <div class="mode-selector">
        <button class="mode-btn" onclick="changeDifficulty(4)">4 位數</button>
        <button class="mode-btn active" onclick="changeDifficulty(5)">5 位數</button>
        <button class="mode-btn" onclick="changeDifficulty(6)">6 位數</button>
    </div>

    <div id="history-scroll"></div>

    <div id="slot-container"></div>

    <div class="keyboard">
        <div class="keyboard-row">
            <button class="key-btn" onclick="handleKeyPress('1')">1</button>
            <button class="key-btn" onclick="handleKeyPress('2')">2</button>
            <button class="key-btn" onclick="handleKeyPress('3')">3</button>
            <button class="key-btn" onclick="handleKeyPress('4')">4</button>
            <button class="key-btn" onclick="handleKeyPress('5')">5</button>
        </div>
        <div class="keyboard-row">
            <button class="key-btn" onclick="handleKeyPress('6')">6</button>
            <button class="key-btn" onclick="handleKeyPress('7')">7</button>
            <button class="key-btn" onclick="handleKeyPress('8')">8</button>
            <button class="key-btn" onclick="handleKeyPress('9')">9</button>
            <button class="key-btn" onclick="handleKeyPress('0')">0</button>
        </div>
        <div class="keyboard-row">
            <button class="key-btn action-back" onclick="handleKeyPress('⌫')">⌫</button>
            <button class="key-btn action-submit" onclick="handleKeyPress('✔')">✔</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay">
        <div class="modal">
            <h2>🎉 解碼成功！</h2>
            <p id="result-text"></p>
            <button class="mode-btn" onclick="initGame()" style="margin-top: 15px;">再玩一把</button>
        </div>
    </div>

    <script>
        let passwordLength = 5; // 預設 5 碼
        let targetAnswer = "";
        let currentInput = [];
        let selectedIndex = 0;
        
        // 計時與統計數據
        let startTime = 0;
        let guessCount = 0;
        let isGameOver = false;

        // 初始化遊戲盤面
        function initGame() {
            isGameOver = false;
            guessCount = 0;
            selectedIndex = 0;
            startTime = Date.now();
            
            // 隱藏彈窗並清空歷史
            document.getElementById('win-overlay').style.display = 'none';
            document.getElementById('history-scroll').innerHTML = '';

            // 1. 隨機產生可重複的密碼（與 Python 端的 random.choices 一致）
            targetAnswer = "";
            for (let i = 0; i < passwordLength; i++) {
                targetAnswer += Math.floor(Math.random() * 10).toString();
            }
            console.log("後端作弊密碼提示: " + targetAnswer); // 方便你本機除錯

            // 2. 建立輸入陣列
            currentInput = new Array(passwordLength).fill("");

            // 3. 動態渲染輸入槽 UI
            const container = document.getElementById('slot-container');
            container.innerHTML = '';
            for (let i = 0; i < passwordLength; i++) {
                const slot = document.createElement('div');
                slot.className = 'input-slot';
                slot.id = 'slot-' + i;
                slot.innerText = '';
                // 點擊直接切換焦點
                slot.addEventListener('click', () => {
                    if (isGameOver) return;
                    selectedIndex = i;
                    updateFocusUI();
                });
                container.appendChild(slot);
            }

            updateFocusUI();
        }

        // 調整焦點高亮
        function updateFocusUI() {
            for (let i = 0; i < passwordLength; i++) {
                const slot = document.getElementById('slot-' + i);
                if (i === selectedIndex) {
                    slot.classList.add('focused');
                } else {
                    slot.classList.remove('focused');
                }
            }
        }

        // 處理鍵盤點擊
        function handleKeyPress(key) {
            if (isGameOver) return;

            if (key === '⌫') {
                currentInput[selectedIndex] = "";
                document.getElementById('slot-' + selectedIndex).innerText = "";
                if (selectedIndex > 0) {
                    selectedIndex--;
                }
                updateFocusUI();
            } else if (key === '✔') {
                // 檢查是否填滿
                if (currentInput.includes("")) {
                    alert("密碼未填滿！");
                    return;
                }
                checkGuess();
            } else {
                // 輸入數字，就地覆寫
                currentInput[selectedIndex] = key;
                document.getElementById('slot-' + selectedIndex).innerText = key;
                
                if (selectedIndex < passwordLength - 1) {
                    selectedIndex++;
                }
                updateFocusUI();
            }
        }

        // 核心驗證與染色邏輯
        function checkGuess() {
            const guessStr = currentInput.join('');
            let correctCount = 0;
            const colors = [];

            // 🎯 完全依照你敲定的「直覺包含判定法」：
            for (let i = 0; i < passwordLength; i++) {
                const gChar = guessStr[i];
                if (gChar === targetAnswer[i]) {
                    colors.push('color-green'); // 🟢 位置、數字完全正確
                    correctCount++;
                } else if (targetAnswer.indexOf(gChar) !== -1) {
                    colors.push('color-yellow'); // 🟡 只要答案裡有這個字，位置錯一律亮黃
                } else {
                    colors.push('color-red'); // 🔴 答案裡完全沒這個字
                }
            }

            guessCount++;

            // 1. 即時將顏色反映在主輸入槽上
            for (let i = 0; i < passwordLength; i++) {
                const slot = document.getElementById('slot-' + i);
                // 先清除舊顏色類別
                slot.classList.remove('color-green', 'color-yellow', 'color-red');
                slot.classList.add(colors[i]);
            }

            // 2. 新增一筆紀錄到歷史面板
            addHistoryRow(guessStr, colors);

            // 3. 判斷通關
            if (correctCount === passwordLength) {
                isGameOver = true;
                const timeUsed = ((Date.now() - startTime) / 1000).toFixed(2);
                
                // 延遲跳出結算畫面
                setTimeout(() => {
                    document.getElementById('result-text').innerHTML = 
                        `挑戰難度：<b>${passwordLength} 位數</b><br>` +
                        `破譯時間：<span style="color:#2ECC71; font-weight:bold;">${timeUsed} 秒</span><br>` +
                        `嘗試次數：<b>${guessCount} 次</b><br><br>` +
                        `請將此結果截圖回報給叡叡！`;
                    document.getElementById('win-overlay').style.display = 'flex';
                }, 600);
            } else {
                // 沒全對：焦點重置回第 1 格，原數字保留，短暫延遲後恢復焦點底色
                selectedIndex = 0;
                setTimeout(updateFocusUI, 1000);
            }
        }

        // 渲染歷史面板列
        function addHistoryRow(guessStr, colors) {
            const scrollArea = document.getElementById('history-scroll');
            const row = document.createElement('div');
            row.className = 'history-row';

            for (let i = 0; i < passwordLength; i++) {
                const tile = document.createElement('div');
                tile.className = `history-tile ${colors[i]}`;
                tile.innerText = guessStr[i];
                row.appendChild(tile);
            }

            scrollArea.appendChild(row);
            // 自動滾動到底部
            scrollArea.scrollTop = scrollArea.scrollHeight;
        }

        // 切換難度
        function changeDifficulty(len) {
            passwordLength = len;
            
            // 更新按鈕高亮
            const btns = document.querySelectorAll('.mode-btn');
            btns.forEach(btn => {
                if (btn.innerText.includes(len.toString())) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            initGame();
        }

        // 鍵盤事件支援：方便用實體電腦鍵盤測試的同學
        window.addEventListener('keydown', (e) => {
            if (/^[0-9]$/.test(e.key)) {
                handleKeyPress(e.key);
            } else if (e.key === 'Backspace') {
                handleKeyPress('⌫');
            } else if (e.key === 'Enter') {
                handleKeyPress('✔');
            }
        });

        // 網頁開啟時自動初始化
        window.onload = initGame;
    </script>
</body>
</html>
