<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ RYE 核心任務測試大廳</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* 矩陣背景微動畫 */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal-container {
            width: 100%;
            max-width: 600px;
            background-color: #111111;
            border: 2px solid #00FF00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            padding: 30px;
            box-sizing: border-box;
            border-radius: 8px;
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            text-align: center;
            text-shadow: 0 0 10px #00FF00;
            border-bottom: 1px dashed #00FF00;
            padding-bottom: 15px;
        }

        .console-log {
            color: #888888;
            font-size: 13px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .system-status {
            color: #00FF00;
            font-weight: bold;
        }

        /* 選單按鈕區塊 */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1a1a1a;
            border: 1px solid #333333;
            padding: 15px 20px;
            text-decoration: none;
            color: #00FF00;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* 預備點擊的高亮效果 */
        .menu-item:hover {
            background-color: #00FF00;
            color: #111111;
            box-shadow: 0 0 15px #00FF00;
            border-color: #00FF00;
            transform: translateY(-2px);
        }

        .menu-item::before {
            content: "> ";
            margin-right: 5px;
        }

        /* 未開放遊戲的鎖定樣式 */
        .menu-item.locked {
            color: #555555;
            border-color: #222222;
            background-color: #0d0d0d;
            cursor: not-allowed;
            pointer-events: none; /* 停用點擊 */
        }

        .menu-item.locked:hover {
            background-color: #0d0d0d;
            color: #555555;
            box-shadow: none;
            transform: none;
        }

        .menu-item.locked::before {
            content: "🔒 ";
        }

        .badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .badge-ready {
            background-color: #1B5E20;
            color: #fff;
        }

        .badge-locked {
            background-color: #333333;
            color: #888888;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 12px;
            color: #444444;
            border-top: 1px solid #222222;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <h1>⚡ RYE SYSTEM PORTAL v1.0</h1>
        
        <div class="console-log">
            [SYSINFO] 初始化測試主機環境... <span class="system-status">SUCCESS</span><br>
            [SYSINFO] 正在載入平民解密任務模組... <span class="system-status">ONLINE</span><br>
            [SYSINFO] 提示：請朋友們選擇下方開發中項目進行 Playtest 盲測。
        </div>

        <div class="menu-list">
            <!-- 任務 1：猜數字遊戲 (已開放) -->
            <a href="./numberle/" class="menu-item">
                <span>安全矩陣解碼 (Numberle)</span>
                <span class="badge badge-ready">可測試</span>
            </a>

            <!-- 任務 2：記憶體配對 (預留位置，未來上傳直接把 href 改成 ./memory_match/) -->
            <a href="./memory_match/" class="menu-item">
                <span>記憶核心配對 (MemoryMatch)</span>
                <span class="badge badge-ready">可測試</span>
            </a>
            </a>

            <!-- 任務 3：數獨自動化 (預留位置) -->
            <a href="#" class="menu-item locked">
                <span>數獨矩陣同步 (Sudoku)</span>
                <span class="badge badge-locked">鎖定中</span>
            </a>
        </div>

        <div class="footer">
            &copy; 2026 RYE-GT500 主機系統. 保留所有破譯權利.
        </div>
    </div>

</body>
</html>
