<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 核心矩陣解碼測試端</title>
    <style>
        body {
            background-color: #111111;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 24px;
            text-shadow: 0 0 10px #00FF00;
        }

        .subtitle {
            color: #888888;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        .timer-container {
            font-size: 28px;
            font-weight: bold;
            color: #00FF00;
            background-color: #1A1A1A;
            border: 1px solid #333333;
            padding: 5px 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 8px rgba(0, 255, 0, 0.2);
            letter-spacing: 2px;
        }

        /* 難度選擇選單 */
        .mode-selector {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            background-color: #222222;
            color: #00FF00;
            border: 1px solid #00FF00;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: #00FF00;
            color: #111111;
            box-shadow: 0 0 10px #00FF00;
        }

        /* 歷史紀錄區 */
        #history-scroll {
            width: 100%;
            max-width: 400px;
            height: 180px;
            border: 1px solid #333333;
            background-color: #050505;
            margin-bottom: 20px;
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .history-tile {
            width: 32px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        /* 當前輸入槽 */
        #slot-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .input-slot {
            width: 50px;
            height: 65px;
            background-color: #222222;
            border: 2px solid #333333;
            color: white;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        .input-slot.focused {
            background-color: #444444;
            border-color: #00FF00;
            box-shadow: 0 0 5px #00FF00;
        }

        /* 虛擬鍵盤 */
        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px; /* 留出空間給返回按鈕 */
        }

        .keyboard-row {
            display: flex;
            gap: 6px;
            width: 100%;
            justify-content: center;
        }

        .key-btn {
            flex: 1;
            max-width: 70px;
            height: 55px;
            background-color: #333333;
            color: white;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .key-btn:active {
            background-color: #555555;
        }

        .key-btn.action-back {
            background-color: #B71C1C;
            max-width: 110px;
        }

        .key-btn.action-submit {
            background-color: #1B5E20;
            max-width: 110px;
        }

        /* 狀態顏色定義 */
        .color-green { background-color: #2ECC71; border-color: #2ECC71; }
        .color-yellow { background-color: #F1C40F; border-color: #F1C40F; }
        .color-red { background-color: #E74C3C; border-color: #E74C3C; }

        /* 🎯 新增：返回大廳按鈕樣式 */
        .back-btn {
            background-color: #331111;
            color: #E74C3C;
            border: 1px solid #E74C3C;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background-color: #E74C3C;
            color: white;
            box-shadow: 0 0 10px #E74C3C;
        }

        /* 彈窗提示 */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background-color: #222222;
            border: 2px solid #00FF00;
            padding: 30px;
            text-align: center;
            max-width: 320px;
            width: 80%;
            box-shadow: 0 0 20px #00FF00;
        }

        .modal h2 { margin-top: 0; color: #2ECC71; }
        .modal p { color: white; font-size: 16px; line-height: 1.6; }
    </style>
</head>
<body>

    <h1>🔐 核心矩陣解碼中</h1>
    <div class="subtitle">平民任務測試端 - 請破譯核心安全密碼</div>

    <div class="mode-selector">
        <button class="mode-btn" onclick="changeDifficulty(4)">4 位數</button>
        <button class="mode-btn active" onclick="changeDifficulty(5)">5 位數</button>
        <button class="mode-btn" onclick="changeDifficulty(6)">6 位數</button>
    </div>

    <div class="timer-container" id="game-timer">00.00 秒</div>

    <div id="history-scroll"></div>

    <div id="slot-container"></div>

    <div class="keyboard">
        <div class="keyboard-row">
            <button class="key-btn" onclick="handleKeyPress('1')">1</button>
            <button class="key-btn" onclick="handleKeyPress('2')">2</button>
            <button class="key-btn" onclick="handleKeyPress('3')">3</button>
            <button class="key-btn" onclick="handleKeyPress('4')">4</button>
            <button class="key-btn" onclick="handleKeyPress('5')">5</button>
        </div>
        <div class="keyboard-row">
            <button class="key-btn" onclick="handleKeyPress('6')">6</button>
            <button class="key-btn" onclick="handleKeyPress('7')">7</button>
            <button class="key-btn" onclick="handleKeyPress('8')">8</button>
            <button class="key-btn" onclick="handleKeyPress('9')">9</button>
            <button class="key-btn" onclick="handleKeyPress('0')">0</button>
        </div>
        <div class="keyboard-row">
            <button class="key-btn action-back" onclick="handleKeyPress('⌫')">⌫</button>
            <button class="key-btn action-submit" onclick="handleKeyPress('✔')">✔</button>
        </div>
    </div>

    <a href="../" class="back-btn">放棄破譯 (返回大廳)</a>

    <div id="win-overlay" class="overlay">
        <div class="modal">
            <h2>🎉 解碼成功！</h2>
            <p id="result-text"></p>
            <button class="mode-btn" onclick="initGame()" style="margin-top: 15px;">再玩一把</button>
        </div>
    </div>

    <script>
        let passwordLength = 5; 
        let targetAnswer = "";
        let currentInput = [];
        let selectedIndex = 0;
        
        let startTime = 0;
        let guessCount = 0;
        let isGameOver = false;
        let timerInterval = null; 
        let isTimerStarted = false; 

        // 初始化遊戲盤面
        function initGame() {
            isGameOver = false;
            guessCount = 0;
            selectedIndex = 0;
            
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            isTimerStarted = false; 
            
            document.getElementById('game-timer').innerText = "00.00 秒";
            document.getElementById('win-overlay').style.display = 'none';
            document.getElementById('history-scroll').innerHTML = '';

            // 1. 隨機產生密碼
            targetAnswer = "";
            for (let i = 0; i < passwordLength; i++) {
                targetAnswer += Math.floor(Math.random() * 10).toString();
            }
            console.log("後端作弊密碼提示: " + targetAnswer); 

            // 2. 建立輸入陣列
            currentInput = new Array(passwordLength).fill("");

            // 3. 動態渲染輸入槽 UI
            const container = document.getElementById('slot-container');
            container.innerHTML = '';
            for (let i = 0; i < passwordLength; i++) {
                const slot = document.createElement('div');
                slot.className = 'input-slot';
                slot.id = 'slot-' + i;
                slot.innerText = '';
                slot.addEventListener('click', () => {
                    if (isGameOver) return;
                    selectedIndex = i;
                    updateFocusUI();
                });
                container.appendChild(slot);
            }

            updateFocusUI();
        }

        // 負責在「第一次敲擊按鍵」時啟動時間軸的函式
        function startTimerIfNeeded() {
            if (!isTimerStarted && !isGameOver) {
                isTimerStarted = true;
                startTime = Date.now(); 
                timerInterval = setInterval(updateTimerUI, 30);
            }
        }

        function updateTimerUI() {
            if (isGameOver) return;
            const elapsed = (Date.now() - startTime) / 1000;
            document.getElementById('game-timer').innerText = elapsed.toFixed(2) + " 秒";
        }

        // 自動同步傳送數據至 Google 表單後台
        function sendDataToBackend(gameType, difficulty, seconds, attempts) {
            const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdZPnQ-HjS57yLN3OZWQFxthZ7jrjiLqVSzYLoLQbEgFevVGA/formResponse";
            
            const formData = new FormData();
            formData.append("entry.933068395", gameType);     
            formData.append("entry.285404027", difficulty);   
            formData.append("entry.1023575376", seconds);      
            formData.append("entry.1728759450", attempts);     

            fetch(formUrl, {
                method: "POST",
                body: formData,
                mode: "no-cors"
            }).then(() => {
                console.log("📊 [SYSTEM] 測試數據已成功同步至雲端後台。");
            }).catch(err => console.error("[ERROR] 後端同步失敗:", err));
        }

        // 調整焦點高亮
        function updateFocusUI() {
            for (let i = 0; i < passwordLength; i++) {
                const slot = document.getElementById('slot-' + i);
                if (i === selectedIndex) {
                    slot.classList.add('focused');
                } else {
                    slot.classList.remove('focused');
                }
            }
        }

        // 處理鍵盤點擊
        function handleKeyPress(key) {
            if (isGameOver) return;

            startTimerIfNeeded();

            if (key === '⌫') {
                currentInput[selectedIndex] = "";
                document.getElementById('slot-' + selectedIndex).innerText = "";
                if (selectedIndex > 0) {
                    selectedIndex--;
                }
                updateFocusUI();
            } else if (key === '✔') {
                if (currentInput.includes("")) {
                    alert("密碼未填滿！");
                    return;
                }
                checkGuess();
            } else {
                currentInput[selectedIndex] = key;
                document.getElementById('slot-' + selectedIndex).innerText = key;
                
                if (selectedIndex < passwordLength - 1) {
                    selectedIndex++;
                }
                updateFocusUI();
            }
        }

        // 核心驗證與染色邏輯
        function checkGuess() {
            const guessStr = currentInput.join('');
            let correctCount = 0;
            const colors = [];

            for (let i = 0; i < passwordLength; i++) {
                const gChar = guessStr[i];
                if (gChar === targetAnswer[i]) {
                    colors.push('color-green'); 
                    correctCount++;
                } else if (targetAnswer.indexOf(gChar) !== -1) {
                    colors.push('color-yellow'); 
                } else {
                    colors.push('color-red'); 
                }
            }

            guessCount++;

            for (let i = 0; i < passwordLength; i++) {
                const slot = document.getElementById('slot-' + i);
                slot.classList.remove('color-green', 'color-yellow', 'color-red');
                slot.classList.add(colors[i]);
            }

            addHistoryRow(guessStr, colors);

            if (correctCount === passwordLength) {
                isGameOver = true;
                clearInterval(timerInterval); 
                
                const timeUsed = ((Date.now() - startTime) / 1000).toFixed(2);
                
                sendDataToBackend("numberle", passwordLength + "位數", timeUsed, guessCount);

                setTimeout(() => {
                    document.getElementById('result-text').innerHTML = 
                        `挑戰難度：<b>${passwordLength} 位數</b><br>` +
                        `破譯時間：<span style="color:#2ECC71; font-weight:bold;">${timeUsed} 秒</span><br>` +
                        `嘗試次數：<b>${guessCount} 次</b><br><br>` +
                        `數據已自動後台同步，感謝參與測試！`;
                    document.getElementById('win-overlay').style.display = 'flex';
                }, 600);
            } else {
                selectedIndex = 0;
                setTimeout(updateFocusUI, 1000);
            }
        }

        // 渲染歷史面板列
        function addHistoryRow(guessStr, colors) {
            const scrollArea = document.getElementById('history-scroll');
            const row = document.createElement('div');
            row.className = 'history-row';

            for (let i = 0; i < passwordLength; i++) {
                const tile = document.createElement('div');
                tile.className = `history-tile ${colors[i]}`;
                tile.innerText = guessStr[i];
                row.appendChild(tile);
            }

            scrollArea.appendChild(row);
            scrollArea.scrollTop = scrollArea.scrollHeight;
        }

        // 切換難度
        function changeDifficulty(len) {
            passwordLength = len;
            
            const btns = document.querySelectorAll('.mode-btn');
            btns.forEach(btn => {
                if (btn.innerText.includes(len.toString())) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            initGame();
        }

        window.addEventListener('keydown', (e) => {
            if (/^[0-9]$/.test(e.key)) {
                handleKeyPress(e.key);
            } else if (e.key === 'Backspace') {
                handleKeyPress('⌫');
            } else if (e.key === 'Enter') {
                handleKeyPress('✔');
            }
        });

        window.onload = initGame;
    </script>
</body>
</html>
