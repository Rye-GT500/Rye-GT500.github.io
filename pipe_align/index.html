<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 核心管道對齊測試端</title>
    <style>
        body {
            background-color: #111111;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 24px;
            text-shadow: 0 0 10px #00FF00;
        }

        .subtitle {
            color: #888888;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        .timer-container {
            font-size: 28px;
            font-weight: bold;
            color: #00FF00;
            background-color: #1A1A1A;
            border: 1px solid #333333;
            padding: 5px 20px;
            border-radius: 4px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 8px rgba(0, 255, 0, 0.2);
            letter-spacing: 2px;
        }

        /* 難度選擇選單 */
        .mode-selector {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            background-color: #222222;
            color: #00FF00;
            border: 1px solid #00FF00;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: #00FF00;
            color: #111111;
            box-shadow: 0 0 10px #00FF00;
        }

        /* 動態管道網格容器 */
        .pipe-grid {
            display: grid;
            gap: 8px;
            background-color: #151515;
            padding: 15px;
            border: 2px solid #333333;
            border-radius: 8px;
            margin-bottom: 30px;
            position: relative;
        }

        /* 水管單元格外框 */
        .pipe-cell {
            background-color: #222222;
            border: 1px solid #444444;
            box-sizing: border-box;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: transform 0.2s ease, background-color 0.3s;
        }

        .pipe-cell:hover {
            border-color: #00FF00;
            background-color: #2a2a2a;
        }

        /* 用 SVG 繪製水管線條 */
        .pipe-svg {
            width: 100%;
            height: 100%;
            transition: transform 0.2s ease;
        }

        /* 未導通的水管顏色 */
        .pipe-path {
            fill: none;
            stroke: #555555;
            stroke-width: 12;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 導通成功後的酷炫螢光綠水管 */
        .connected .pipe-path {
            stroke: #00FF00 !important;
            filter: drop-shadow(0 0 5px #00FF00);
        }

        /* 標示起點與終點的外框顏色 */
        .start-node { border: 2px dashed #1ABC9C; position: relative; }
        .end-node { border: 2px dashed #E67E22; position: relative; }
        
        .start-node::after { content: "IN"; position: absolute; top: -18px; left: 4px; font-size: 11px; color: #1ABC9C; font-weight: bold; }
        .end-node::after { content: "OUT"; position: absolute; bottom: -18px; right: 4px; font-size: 11px; color: #E67E22; font-weight: bold; }

        .back-btn {
            background-color: #331111;
            color: #E74C3C;
            border: 1px solid #E74C3C;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background-color: #E74C3C;
            color: white;
            box-shadow: 0 0 10px #E74C3C;
        }

        /* 結算彈窗 */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background-color: #222222;
            border: 2px solid #00FF00;
            padding: 30px;
            text-align: center;
            max-width: 320px;
            width: 80%;
            box-shadow: 0 0 20px #00FF00;
        }

        .modal h2 { margin-top: 0; color: #2ECC71; }
        .modal p { color: white; font-size: 16px; line-height: 1.6; }
    </style>
</head>
<body>

    <h1>⚡ 核心管道對齊中</h1>
    <div class="subtitle">平民任務測試端 - 旋轉微調冷卻液管道使其全線導通</div>

    <div class="mode-selector">
        <button class="mode-btn" onclick="changeGrid(4)">4 x 4 網格</button>
        <button class="mode-btn active" onclick="changeGrid(5)">5 x 5 網格</button>
        <button class="mode-btn" onclick="changeGrid(6)">6 x 6 網格</button>
    </div>

    <div class="timer-container" id="game-timer">00.00 秒</div>

    <div id="grid" class="pipe-grid"></div>

    <a href="../" class="back-btn">放棄修復 (返回大廳)</a>

    <div id="win-overlay" class="overlay">
        <div class="modal">
            <h2>🎉 管道解鎖成功！</h2>
            <p id="result-text"></p>
            <button class="mode-btn" onclick="initGame()" style="background-color: #222222; color: #00FF00; border: 1px solid #00FF00; padding: 8px 16px; cursor: pointer; font-weight: bold; margin-top: 15px;">再玩一把</button>
        </div>
    </div>

    <script>
        let size = 5; // 預設改為黃金對抗難度的 5x5
        let gridData = [];
        let isGameOver = false;
        let isTimerStarted = false;
        let startTime = 0;
        let timerInterval = null;
        let rotateCount = 0;

        const PIPE_TYPES = [
            { name: 'I', paths: [1, 0, 1, 0], svg: '<path class="pipe-path" d="M40,0 L40,80"/>' }, // 直線管
            { name: 'L', paths: [1, 1, 0, 0], svg: '<path class="pipe-path" d="M40,0 L40,40 L80,40"/>' }, // L彎管
            { name: 'T', paths: [0, 1, 1, 1], svg: '<path class="pipe-path" d="M0,40 L80,40 M40,40 L40,80"/>' }, // 三通管
            { name: 'X', paths: [1, 1, 1, 1], svg: '<path class="pipe-path" d="M40,0 L40,80 M0,40 L80,40"/>' }  // 十字管
        ];

        function initGame() {
            isGameOver = false;
            isTimerStarted = false;
            rotateCount = 0;

            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('game-timer').innerText = "00.00 秒";
            document.getElementById('win-overlay').style.display = 'none';

            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            gridData = [];

            // 🎯 排版自適應優化：讓 6x6 能夠完美塞入螢幕不爆框
            let cellSize = 80;  // 4x4 用 80px
            if (size === 5) cellSize = 65;  // 5x5 用 65px
            if (size === 6) cellSize = 55;  // 6x6 用 55px

            gridElement.style.gridTemplateColumns = `repeat(${size}, ${cellSize}px)`;
            gridElement.style.gridTemplateRows = `repeat(${size}, ${cellSize}px)`;

            for (let r = 0; r < size; r++) {
                gridData[r] = [];
                for (let c = 0; c < size; c++) {
                    const typeIdx = Math.floor(Math.random() * PIPE_TYPES.length);
                    const basePipe = PIPE_TYPES[typeIdx];
                    const initialRotation = Math.floor(Math.random() * 4);
                    
                    gridData[r][c] = {
                        typeIndex: typeIdx,
                        rotation: initialRotation,
                        r: r,
                        c: c
                    };

                    const cell = document.createElement('div');
                    cell.className = 'pipe-cell';
                    cell.style.width = `${cellSize}px`;
                    cell.style.height = `${cellSize}px`;
                    
                    if (r === 0 && c === 0) cell.classList.add('start-node');
                    if (r === size - 1 && c === size - 1) cell.classList.add('end-node');
                    cell.id = `cell-${r}-${c}`;

                    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                    svg.setAttribute("class", "pipe-svg");
                    svg.setAttribute("viewBox", "0 0 80 80");
                    svg.id = `svg-${r}-${c}`;
                    svg.innerHTML = basePipe.svg;
                    
                    svg.style.transform = `rotate(${initialRotation * 90}deg)`;

                    cell.appendChild(svg);
                    cell.addEventListener('click', () => handlePipeClick(r, c));
                    gridElement.appendChild(cell);
                }
            }

            if (checkConnection(true)) {
                initGame();
            }
        }

        function startTimerIfNeeded() {
            if (!isTimerStarted && !isGameOver) {
                isTimerStarted = true;
                startTime = Date.now();
                timerInterval = setInterval(() => {
                    if (isGameOver) return;
                    const elapsed = (Date.now() - startTime) / 1000;
                    document.getElementById('game-timer').innerText = elapsed.toFixed(2) + " 秒";
                }, 30);
            }
        }

        function handlePipeClick(r, c) {
            if (isGameOver) return;
            startTimerIfNeeded();

            rotateCount++;
            gridData[r][c].rotation = (gridData[r][c].rotation + 1) % 4;

            const svg = document.getElementById(`svg-${r}-${c}`);
            svg.style.transform = `rotate(${gridData[r][c].rotation * 90}deg)`;

            checkConnection(false);
        }

        function getDirections(pipe) {
            const basePaths = PIPE_TYPES[pipe.typeIndex].paths;
            const rot = pipe.rotation;
            const currentPaths = [];
            for (let i = 0; i < 4; i++) {
                currentPaths[(i + rot) % 4] = basePaths[i];
            }
            return currentPaths;
        }

        function checkConnection(isCheckingInit) {
            const visited = Array.from({ length: size }, () => Array(size).fill(false));
            const connectedCells = []; 

            function dfs(r, c, comingFromDir) {
                if (r < 0 || r >= size || c < 0 || c >= size || visited[r][c]) return false;

                const currentDirs = getDirections(gridData[r][c]);

                if (comingFromDir !== null && currentDirs[comingFromDir] === 0) return false;

                visited[r][c] = true;
                connectedCells.push({ r, c });

                // 動態判別最新終點位置
                if (r === size - 1 && c === size - 1) {
                    return true;
                }

                if (currentDirs[0] === 1 && dfs(r - 1, c, 2)) return true;
                if (currentDirs[1] === 1 && dfs(r, c + 1, 3)) return true;
                if (currentDirs[2] === 1 && dfs(r + 1, c, 0)) return true;
                if (currentDirs[3] === 1 && dfs(r, c - 1, 1)) return true;

                return false;
            }

            const isConnected = dfs(0, 0, null);

            if (isConnected && !isCheckingInit) {
                isGameOver = true;
                clearInterval(timerInterval);
                const timeUsed = ((Date.now() - startTime) / 1000).toFixed(2);

                connectedCells.forEach(node => {
                    document.getElementById(`cell-${node.r}-${node.c}`).classList.add('connected');
                });

                sendDataToBackend("pipe_align", `${size}x${size}網格`, timeUsed, rotateCount);

                setTimeout(() => {
                    document.getElementById('result-text').innerHTML = 
                        `任務規格：<b>${size} x ${size} 管道對齊</b><br>` +
                        `對齊時間：<span style="color:#2ECC71; font-weight:bold;">${timeUsed} 秒</span><br>` +
                        `旋轉次數：<b>${rotateCount} 次</b><br><br>` +
                        `數據已自動後台同步，感謝參與測試！`;
                    document.getElementById('win-overlay').style.display = 'flex';
                }, 600);
            }

            return isConnected;
        }

        function sendDataToBackend(gameType, difficulty, seconds, attempts) {
            const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdZPnQ-HjS57yLN3OZWQFxthZ7jrjiLqVSzYLoLQbEgFevVGA/formResponse";
            const formData = new FormData();
            formData.append("entry.933068395", gameType);     
            formData.append("entry.285404027", difficulty);   
            formData.append("entry.1023575376", seconds);      
            formData.append("entry.1728759450", attempts);     

            fetch(formUrl, {
                method: "POST",
                body: formData,
                mode: "no-cors"
            }).then(() => {
                console.log("📊 [SYSTEM] 管道測試數據已同步至雲端後台。");
            }).catch(err => console.error("[ERROR] 後端同步失敗:", err));
        }

        function changeGrid(newSize) {
            size = newSize;
            
            const btns = document.querySelectorAll('.mode-btn');
            btns.forEach(btn => {
                if (btn.innerText.includes(`${newSize} x ${newSize}`)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            initGame();
        }

        window.onload = initGame;
    </script>
</body>
</html>
